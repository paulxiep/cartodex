# CLA Assistant Lite: gates every PR from a non-signer.
# Signatures are stored in this repo on the `cla-signatures` branch, so there
# is no external service dependency.
#
# Setup required once (repo Settings, not code):
#   - Add a repo secret PERSONAL_ACCESS_TOKEN (a fine-grained or classic PAT
#     with `contents: write` on this repo) so the action can commit signatures.
#   - Create the `cla-signatures` branch and leave it UNPROTECTED. This action does
#     not create its storage branch; if it is missing you get "Branch cla-signatures
#     not found". An empty orphan branch is fine.
#
# Individual contributors sign in-thread by commenting the sign phrase below.
# Corporate contributions (CLA-corporate.md) are handled manually per
# CONTRIBUTING.md; the automated gate covers the individual CLA.
name: CLA Assistant
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          path-to-signatures: 'signatures/version1/cla.json'
          path-to-document: 'https://github.com/paulxiep/cartodex/blob/main/CLA-individual.md'
          branch: 'cla-signatures'
          # The repo owner does not sign their own CLA (it gates inbound contributions,
          # not the author's own commits); external contributors still sign in-thread.
          allowlist: 'paulxiep,dependabot[bot]'
          custom-notsigned-prcomment: 'Thank you for your contribution. Before it can be merged, please read our [Contributor License Agreement](https://github.com/paulxiep/cartodex/blob/main/CLA-individual.md) and sign it by posting the comment below in this PR. Contributing on behalf of a company? See [CONTRIBUTING.md](https://github.com/paulxiep/cartodex/blob/main/CONTRIBUTING.md) for the corporate CLA.'
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA. Thank you.'
